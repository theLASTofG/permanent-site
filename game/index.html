<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelicanos Azuis - Níveis</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to bottom, #cce7ff, #87cefa);
  }
  h1 { margin-top: 10px; }
  #info { margin: 10px; font-weight: bold; }
  #energia-bar {
    width: 300px;
    height: 20px;
    background: #ddd;
    margin: 10px auto;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 5px #333;
  }
  #energia-fill {
    height: 100%;
    width: 100%;
    background: #1e1e8f; /* Azul escuro */
    transition: width 0.3s;
  }
  #game {
    display: grid;
    grid-template-columns: repeat(10, 50px);
    grid-template-rows: repeat(10, 50px);
    gap: 2px;
    justify-content: center;
    margin: 20px auto;
  }
  .cell {
    width: 50px;
    height: 50px;
    border: 1px solid #555;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #87cefa;
    font-weight: bold;
    font-size: 24px;
    user-select: none;
  }
  .pelicano { background-color: #00008b; color: white; }
  .chave { background-color: #ffd700; color: black; }
  .porta { background-color: #8b4513; color: white; }
  .obstaculo { background-color: #8b0000; }
</style>
</head>
<body>

<h1>Pelicanos Azuis</h1>
<div id="info">Nível: 1 | Energia: 20</div>
<div id="energia-bar"><div id="energia-fill"></div></div>
<div id="game"></div>

<script>
const gridSize = 10;
let nivel = 1;
let energia = 20;
let pelicanoPos = {x:0, y:0};
let chavePos = {};
let portaPos = {};
let chavePegou = false;
let obstaculos = [];

const gameEl = document.getElementById('game');
const energiaFill = document.getElementById('energia-fill');
const infoEl = document.getElementById('info');

const cells = [];
for(let y=0;y<gridSize;y++){
  for(let x=0;x<gridSize;x++){
    const cell = document.createElement('div');
    cell.classList.add('cell');
    gameEl.appendChild(cell);
    cells.push(cell);
  }
}

function getIndex(x,y){ return y*gridSize + x; }

function gerarNivel(){
  pelicanoPos = {x:0,y:0};
  chavePegou=false;
  energia = 20;
  chavePos = {x:Math.floor(Math.random()*gridSize), y:Math.floor(Math.random()*gridSize)};
  portaPos = {x:gridSize-1, y:gridSize-1};

  // Obstáculos crescentes por nível
  obstaculos = [];
  const numObs = Math.min(15 + nivel*2, 40);
  while(obstaculos.length < numObs){
    const x = Math.floor(Math.random()*gridSize);
    const y = Math.floor(Math.random()*gridSize);
    if((x===pelicanoPos.x && y===pelicanoPos.y) || 
       (x===chavePos.x && y===chavePos.y) ||
       (x===portaPos.x && y===portaPos.y)) continue;
    if(!obstaculos.some(o=>o.x===x && o.y===y)) obstaculos.push({x,y});
  }

  atualizarGrid();
}

function atualizarGrid(){
  cells.forEach(cell=>{
    cell.className='cell';
    cell.textContent='';
  });
  obstaculos.forEach(o=>cells[getIndex(o.x,o.y)].classList.add('obstaculo'));
  const pelicanoCell = cells[getIndex(pelicanoPos.x,pelicanoPos.y)];
  pelicanoCell.classList.add('pelicano');
  pelicanoCell.textContent='P';
  if(!chavePegou){
    const chaveCell = cells[getIndex(chavePos.x,chavePos.y)];
    chaveCell.classList.add('chave');
    chaveCell.textContent='K';
  }
  const portaCell = cells[getIndex(portaPos.x,portaPos.y)];
  portaCell.classList.add('porta');
  portaCell.textContent='D';

  energiaFill.style.width=(energia*5)+'%';
  infoEl.textContent=`Nível: ${nivel} | Energia: ${energia}`;
}

function gameOver(msg){
  alert(msg);
  nivel=1;
  gerarNivel();
}

document.addEventListener('keydown', e=>{
  let dx=0, dy=0;
  if(e.key==='ArrowUp') dy=-1;
  else if(e.key==='ArrowDown') dy=1;
  else if(e.key==='ArrowLeft') dx=-1;
  else if(e.key==='ArrowRight') dx=1;
  const newX = pelicanoPos.x + dx;
  const newY = pelicanoPos.y + dy;
  if(newX>=0 && newX<gridSize && newY>=0 && newY<gridSize){
    if(obstaculos.some(o=>o.x===newX && o.y===newY)) return;
    pelicanoPos.x=newX;
    pelicanoPos.y=newY;
    energia--;
    if(!chavePegou && pelicanoPos.x===chavePos.x && pelicanoPos.y===chavePos.y){
      chavePegou=true;
      energia+=10;
      alert('Você pegou a chave! Energia aumentada.');
    }
    if(pelicanoPos.x===portaPos.x && pelicanoPos.y===portaPos.y){
      if(chavePegou){
        nivel++;
        alert(`Parabéns! Avançando para o nível ${nivel}`);
        gerarNivel();
        return;
      } else alert('Você precisa pegar a chave antes de abrir a porta!');
    }
    if(energia<=0) gameOver('Acabou a energia! Game Over.');
    atualizarGrid();
  }
});

// Inicializa
gerarNivel();
</script>

</body>
</html>
