<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pistolona Dev - Login</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  overflow:hidden;
}
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
.loginBox{
  background:rgba(30,41,59,0.85);
  padding:40px;
  border-radius:12px;
  width:320px;
  text-align:center;
  backdrop-filter:blur(10px);
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}
.loginBox h1{ color:#38bdf8; margin-bottom:10px; }
.loginBox p{ color:#cbd5f5; margin-bottom:20px; }
input{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border:none;
  border-radius:6px;
  background:#020617;
  color:white;
}
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  background:#0ea5e9;
  transform:scale(1.05);
}
#erro{
  color:#ef4444;
  margin-top:10px;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="loginBox">
<h1>Pistolona Dev</h1>
<p>Aprenda programação do zero</p>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<p id="erro"></p>
</div>

<script>
/* LOGIN */
function login(){
  let user=document.getElementById("user").value;
  let pass=document.getElementById("pass").value;
  if(user=="" || pass==""){
    document.getElementById("erro").innerText="Preencha todos os campos";
    return;
  }
  localStorage.setItem("usuario",user);
  window.location.href="index.html";
}

/* PARTICULAS */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.6,
    vy:(Math.random()-0.5)*0.6,
    r:Math.random()*2+1
  });
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        ctx.strokeStyle='rgba(56,189,248,0.15)';
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.stroke();
      }
    }
  }
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="#38bdf8";
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
